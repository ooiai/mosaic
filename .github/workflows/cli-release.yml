name: CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.2.0-beta.6)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-assets:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - runner: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          cargo build --release -p mosaic-cli --manifest-path cli/Cargo.toml --target "${{ matrix.target }}"

      - name: Package release asset
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          fi
          chmod +x cli/scripts/package_release_asset.sh
          ./cli/scripts/package_release_asset.sh --version "$VERSION" --target "${{ matrix.target }}"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: |
            cli/dist/**/mosaic-*-${{ matrix.platform }}.*

  build-manifests:
    name: Build install manifests
    runs-on: ubuntu-latest
    needs: build-assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: release-assets

      - name: Generate brew/scoop manifests and checksums
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          fi
          chmod +x cli/scripts/update_distribution_manifests.sh
          ./cli/scripts/update_distribution_manifests.sh \
            --version "$VERSION" \
            --assets-dir "$PWD/release-assets" \
            --output-dir "$PWD/release-assets"
          cp cli/install.sh release-assets/install.sh
          cp cli/install.ps1 release-assets/install.ps1

      - name: Verify release assets integrity (archives + checksums/manifests)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          fi
          chmod +x cli/scripts/release_verify_archives.sh
          ./cli/scripts/release_verify_archives.sh \
            --version "$VERSION" \
            --assets-dir "$PWD/release-assets"
          chmod +x cli/scripts/release_verify_assets.sh
          ./cli/scripts/release_verify_assets.sh \
            --version "$VERSION" \
            --assets-dir "$PWD/release-assets"

      - name: Smoke install from assembled release assets (linux)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          fi
          chmod +x cli/install.sh
          INSTALL_DIR="$RUNNER_TEMP/mosaic-bin"
          mkdir -p "$INSTALL_DIR"
          ./cli/install.sh \
            --version "$VERSION" \
            --assets-dir "$PWD/release-assets" \
            --install-dir "$INSTALL_DIR" \
            --release-only
          "$INSTALL_DIR/mosaic" --version

      - name: Upload release manifests
        uses: actions/upload-artifact@v4
        with:
          name: cli-release-manifests
          path: |
            release-assets/mosaic.rb
            release-assets/mosaic.json
            release-assets/SHA256SUMS
            release-assets/install.sh
            release-assets/install.ps1

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-assets, build-manifests]

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: release-assets

      - name: Download release manifests
        uses: actions/download-artifact@v4
        with:
          name: cli-release-manifests
          path: release-assets

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: |
            release-assets/mosaic-*.tar.gz
            release-assets/mosaic-*.zip
            release-assets/mosaic-*.sha256
            release-assets/mosaic.rb
            release-assets/mosaic.json
            release-assets/SHA256SUMS
            release-assets/install.sh
            release-assets/install.ps1
          body: |
            Mosaic CLI release ${{ steps.release.outputs.version }}

            Install:
            - macOS (Homebrew): `brew install https://github.com/ooiai/mosaic/releases/download/${{ steps.release.outputs.version }}/mosaic.rb`
            - Linux/macOS (script): `curl -fsSL https://github.com/ooiai/mosaic/releases/download/${{ steps.release.outputs.version }}/install.sh | bash`
            - Windows (PowerShell): `irm https://github.com/ooiai/mosaic/releases/download/${{ steps.release.outputs.version }}/install.ps1 | iex`
