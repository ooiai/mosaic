name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      run_plugin_soak:
        description: Run plugin runtime soak job
        required: false
        type: boolean
        default: false
      soak_iterations:
        description: Iteration count for plugin soak
        required: false
        type: string
        default: '200'

env:
  CARGO_TERM_COLOR: always

jobs:
  docs-site-check:
    name: Docs Site Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run docs acceptance checks
      run: |
        mkdir -p reports
        bash site/scripts/check_docs.sh --report-dir reports --report-prefix docs-site-check 2>&1 | tee reports/docs-site-check.log

    - name: Upload docs check report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: docs-site-check-report
        path: |
          reports/docs-site-check.log
          reports/docs-site-check-syntax.log
          reports/docs-site-check-links.log
          reports/docs-site-check-summary.json

  web-test:
    name: Web App Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Install dependencies
      run: pnpm install

    - name: Lint web app
      run: pnpm lint:web

    - name: Build web app
      run: pnpm build:web

    - name: Upload web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-dist
        path: apps/web/dist/

  rust-cli-test:
    name: Rust CLI Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies (CLI)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cli-cargo-

    - name: Install CLI test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ripgrep zip unzip

    - name: Run Rust CLI release tooling smoke
      run: |
        cd cli
        ./scripts/release_tooling_smoke.sh

    - name: Run Rust CLI release install smoke
      run: |
        cd cli
        ./scripts/release_install_smoke.sh

    - name: Run Rust CLI clippy quality gate
      run: |
        cd cli
        cargo clippy -p mosaic-cli -- -D warnings

    - name: Run Rust CLI full regression suite
      run: |
        cd cli
        ./scripts/run_regression_suite.sh

    - name: Upload Rust CLI regression report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-regression-report
        path: cli/reports/regression-latest.log

  rust-cli-build:
    name: Rust CLI Build (${{ matrix.platform }})
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies (CLI)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cli-build-cargo-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cli-build-cargo-

    - name: Build Rust CLI release binary
      run: |
        cd cli
        cargo build --release -p mosaic-cli

    - name: Upload Rust CLI binary (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-${{ runner.os }}-binary
        path: cli/target/release/mosaic

    - name: Upload Rust CLI binary (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-${{ runner.os }}-binary
        path: cli/target/release/mosaic.exe

  rust-cli-plugin-soak:
    name: Rust CLI Plugin Soak
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_plugin_soak == true)
    runs-on: ubuntu-latest
    env:
      SOAK_ITERATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.soak_iterations || '200' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies (CLI)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cli-soak-cargo-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cli-soak-cargo-

    - name: Run plugin resource soak
      run: |
        mkdir -p cli/reports
        cd cli
        ITERATIONS="${SOAK_ITERATIONS}" ./scripts/plugin_resource_soak.sh | tee reports/plugin-soak-latest.log

    - name: Upload plugin soak report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-plugin-soak-report
        path: cli/reports/plugin-soak-latest.log

  macos-app-test:
    name: macOS App Tests
    runs-on: macos-latest
    env:
      APP_BUILD: ${{ github.run_number }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build embedded CLI binary
      run: |
        cd cli
        cargo build --release -p mosaic-cli

    - name: Test macOS app package
      run: |
        cd apps/macos
        swift test

    - name: Build macOS app package
      run: |
        cd apps/macos
        swift build -c release

    - name: Package macOS app bundle
      run: |
        if [[ -n "${MACOS_SIGN_IDENTITY}" && -n "${MACOS_NOTARY_PROFILE}" && "${GITHUB_REF}" == refs/tags/v* ]]; then
          MACOS_NOTARIZE=1 ./apps/macos/scripts/package_app.sh
        else
          ./apps/macos/scripts/package_app.sh
        fi
      env:
        SKIP_CLI_BUILD: "1"
        SKIP_SWIFT_BUILD: "1"
        MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        MACOS_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}

    - name: Stage standalone CLI sidecar for binary artifact
      run: |
        mkdir -p apps/macos/.build/release/bin
        cp cli/target/release/mosaic apps/macos/.build/release/bin/mosaic
        chmod +x apps/macos/.build/release/bin/mosaic

    - name: Upload macOS app build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-app-bundle
        path: |
          apps/macos/dist/Mosaic.app
          apps/macos/dist/Mosaic-macOS.zip

    - name: Upload macOS raw binary artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-app-binary
        path: |
          apps/macos/.build/release/MosaicMacApp
          apps/macos/.build/release/bin/mosaic

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [web-test, rust-cli-test, rust-cli-build, macos-app-test]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          macos-app-bundle/**/*
          macos-app-binary/**/*
          rust-cli-Linux-binary/**/*
          rust-cli-Windows-binary/**/*
          rust-cli-macOS-binary/**/*
        draft: true
        prerelease: ${{ contains(github.ref, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
