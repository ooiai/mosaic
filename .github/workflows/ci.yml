name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      run_plugin_soak:
        description: Run plugin runtime soak job
        required: false
        type: boolean
        default: false
      soak_iterations:
        description: Iteration count for plugin soak
        required: false
        type: string
        default: '200'

env:
  CARGO_TERM_COLOR: always

jobs:
  web-test:
    name: Web App Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Install dependencies
      run: pnpm install

    - name: Lint web app
      run: pnpm lint:web

    - name: Build web app
      run: pnpm build:web

    - name: Upload web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-dist
        path: apps/web/dist/

  rust-cli-test:
    name: Rust CLI Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies (CLI)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cli-cargo-

    - name: Install CLI test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ripgrep

    - name: Run Rust CLI clippy quality gate
      run: |
        cd cli
        cargo clippy -p mosaic-cli -- -D warnings

    - name: Run Rust CLI full regression suite
      run: |
        cd cli
        ./scripts/run_regression_suite.sh

    - name: Upload Rust CLI regression report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-regression-report
        path: cli/reports/regression-latest.log

  rust-cli-build:
    name: Rust CLI Build (${{ matrix.platform }})
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies (CLI)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cli-build-cargo-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cli-build-cargo-

    - name: Build Rust CLI release binary
      run: |
        cd cli
        cargo build --release -p mosaic-cli

    - name: Upload Rust CLI binary (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-${{ runner.os }}-binary
        path: cli/target/release/mosaic

    - name: Upload Rust CLI binary (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-${{ runner.os }}-binary
        path: cli/target/release/mosaic.exe

  rust-cli-plugin-soak:
    name: Rust CLI Plugin Soak
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_plugin_soak == true)
    runs-on: ubuntu-latest
    env:
      SOAK_ITERATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.soak_iterations || '200' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies (CLI)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-cli-soak-cargo-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cli-soak-cargo-

    - name: Run plugin resource soak
      run: |
        mkdir -p cli/reports
        cd cli
        ITERATIONS="${SOAK_ITERATIONS}" ./scripts/plugin_resource_soak.sh | tee reports/plugin-soak-latest.log

    - name: Upload plugin soak report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-cli-plugin-soak-report
        path: cli/reports/plugin-soak-latest.log

  desktop-test:
    name: Desktop App Tests
    needs: web-test
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          apps/desktop/src-tauri/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Install dependencies
      run: pnpm install

    - name: Download web build artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-dist
        path: apps/web/dist/

    - name: Build desktop app
      run: |
        cd apps/desktop
        pnpm build

    - name: Upload desktop build artifacts (Ubuntu)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: desktop-linux
        path: apps/desktop/src-tauri/target/release/bundle/

    - name: Upload desktop build artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: desktop-windows
        path: apps/desktop/src-tauri/target/release/bundle/

    - name: Upload desktop build artifacts (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: desktop-macos
        path: apps/desktop/src-tauri/target/release/bundle/

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [web-test, rust-cli-test, rust-cli-build, desktop-test]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          desktop-linux/**/*
          desktop-windows/**/*
          desktop-macos/**/*
          rust-cli-Linux-binary/**/*
          rust-cli-Windows-binary/**/*
          rust-cli-macOS-binary/**/*
        draft: true
        prerelease: ${{ contains(github.ref, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
