schema_version: 1
active_profile: mock
profiles:
  mock:
    type: mock
    model: mock
runtime:
  max_provider_round_trips: 4
  max_workflow_provider_round_trips: 4
  continue_after_tool_error: false
deployment:
  profile: local
  workspace_name: mosaic-full-stack-mock
auth:
  telegram_secret_token_env: MOSAIC_TELEGRAM_SECRET_TOKEN
session_store:
  root_dir: .mosaic/sessions
inspect:
  runs_dir: .mosaic/runs
audit:
  root_dir: .mosaic/audit
  retention_days: 30
  event_replay_window: 512
  redact_inputs: false
observability:
  enable_metrics: true
  enable_readiness: true
  slow_consumer_lag_threshold: 64
policies:
  allow_exec: false
  allow_webhook: true
  allow_cron: true
  allow_mcp: true
  hot_reload_enabled: false
